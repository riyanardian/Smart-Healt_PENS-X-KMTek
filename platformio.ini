
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
	bblanchon/ArduinoJson @ ^6.21.3
	bodmer/TFT_eSPI @ ^2.5.31
	adafruit/Adafruit FT6206 Library @ ^1.0.7
	oxullo/MAX30100lib@^1.2.1
	adafruit/Adafruit MLX90614 Library @ ^2.1.3
	electroniccats/MPU6050

build_flags = 
	-D USER_SETUP_LOADED=1
	-D ILI9488_DRIVER=1
	-D TFT_WIDTH=320
	-D TFT_HEIGHT=480
	
	-D TFT_MISO=19
	-D TFT_MOSI=23
	-D TFT_SCLK=18
	
	-D TFT_CS=14
	-D TFT_DC=12
	-D TFT_RST=5
	
	-D TOUCH_CS=255
	-D TOUCH_INT=255
	
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D SPI_FREQUENCY=27000000
	
	-D CORE_DEBUG_LEVEL=0
	-D ARDUINO_ESP32_DEV
monitor_filters = 
	colorize
